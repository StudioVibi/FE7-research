/* ---------- state ---------- */
const CATEGORIES = [
  { key: "official",  label: "Official Team" },
  { key: "artist",    label: "Artists" },
  { key: "single",    label: "Single Posts" },
  { key: "community", label: "Communities" }
];
const GAME_LABEL = { fe7: "Blazing Blade", fe5: "Thracia 776" };
const SORTS = [
  { key: "az",  label: "A–Z" },
  { key: "za",  label: "Z–A" },
  { key: "fav", label: "Favorites first then A–Z" }
];

/*
 * Filter model: two independent radio groups, always exactly one
 * selection active in each — no toggles, no hidden combinations.
 *   view: "all" | "favs" | one category key
 *   game: "all" | "fe7" | "fe5"
 * The visible list is simply view ∩ game.
 */
let state = {
  view: "all",
  game: "all",
  sort: "az",
  favs: new Set(JSON.parse(localStorage.getItem("fe-artist-favs") || "[]"))
};

const idOf = e => (e.category + ":" + e.name + (e.singleTitle ? ":" + e.singleTitle : "")).toLowerCase();

function saveFavs() {
  localStorage.setItem("fe-artist-favs", JSON.stringify([...state.favs]));
}

/* ---------- filters: two radio rows (what × game) ---------- */
function renderFilters() {
  const f = document.getElementById("filters");
  f.innerHTML = "";
  const mkRow = () => {
    const row = document.createElement("div");
    row.className = "filter-row";
    f.appendChild(row);
    return row;
  };
  const mk = (row, label, selected, onClick) => {
    const s = document.createElement("span");
    s.className = "u" + (selected ? " selected" : "");
    s.textContent = label;
    s.onclick = onClick;
    row.appendChild(s);
  };

  const viewRow = mkRow();
  const views = [
    { key: "all",  label: "Show all" },
    { key: "favs", label: "Favorites" },
    ...CATEGORIES
  ];
  for (const v of views) {
    mk(viewRow, v.label, state.view === v.key, () => { state.view = v.key; render(); });
  }

  const gameRow = mkRow();
  const games = [
    { key: "all", label: "Both games" },
    { key: "fe7", label: GAME_LABEL.fe7 },
    { key: "fe5", label: GAME_LABEL.fe5 }
  ];
  for (const g of games) {
    mk(gameRow, g.label, state.game === g.key, () => { state.game = g.key; render(); });
  }
}

/* ---------- sort control ---------- */
function renderSort() {
  document.getElementById("sortLabel").textContent = SORTS.find(s => s.key === state.sort).label;
  const box = document.getElementById("sortOptions");
  box.innerHTML = "";
  for (const s of SORTS) {
    const o = document.createElement("span");
    o.className = "u" + (s.key === state.sort ? " selected" : "");
    o.textContent = s.label;
    o.onclick = ev => {
      ev.stopPropagation();
      state.sort = s.key;
      box.classList.remove("open");
      render();
    };
    box.appendChild(o);
  }
}
document.getElementById("sortToggle").onclick = ev => {
  ev.stopPropagation();
  document.getElementById("sortOptions").classList.toggle("open");
};
document.addEventListener("click", () => document.getElementById("sortOptions").classList.remove("open"));

/* ---------- list ---------- */
function sortEntries(arr) {
  const byName = (a, b) => a.name.localeCompare(b.name, "en", { sensitivity: "base" });
  if (state.sort === "az") return arr.sort(byName);
  if (state.sort === "za") return arr.sort((a, b) => byName(b, a));
  return arr.sort((a, b) => {
    const fa = state.favs.has(idOf(a)) ? 0 : 1;
    const fb = state.favs.has(idOf(b)) ? 0 : 1;
    return fa - fb || byName(a, b);
  });
}

function entryEl(e) {
  const id = idOf(e);
  const div = document.createElement("div");
  div.className = "entry" + (state.favs.has(id) ? " faved" : "");

  const star = document.createElement("span");
  star.className = "star";
  star.textContent = state.favs.has(id) ? "★" : "☆";
  star.title = "favorite";
  star.onclick = () => {
    state.favs.has(id) ? state.favs.delete(id) : state.favs.add(id);
    saveFavs();
    render();
  };
  div.appendChild(star);

  const nameLine = document.createElement("div");
  nameLine.className = "entry-name";
  nameLine.textContent = e.category === "single" && e.singleTitle
    ? "“" + e.singleTitle + "” by " + e.name
    : e.name;
  if (e.nativeName) {
    const nat = document.createElement("span");
    nat.className = "native";
    nat.textContent = e.nativeName;
    nameLine.appendChild(nat);
  }
  if (e.deceased) {
    const d = document.createElement("span");
    d.className = "dagger";
    d.textContent = "†";
    nameLine.appendChild(d);
  }
  const tags = [];
  tags.push(e.games.map(g => GAME_LABEL[g]).join(" · "));
  if (e.style === "illustration") tags.push("illustration");
  for (const t of tags) {
    const tag = document.createElement("span");
    tag.className = "tag";
    tag.textContent = t;
    nameLine.appendChild(tag);
  }
  div.appendChild(nameLine);

  if (e.links && e.links.length) {
    const linksLine = document.createElement("div");
    linksLine.className = "entry-links";
    e.links.forEach((l, i) => {
      if (i > 0) {
        const sep = document.createElement("span");
        sep.className = "sep";
        sep.textContent = "-";
        linksLine.appendChild(sep);
      }
      const a = document.createElement("a");
      a.className = "u";
      a.href = l.url;
      a.target = "_blank";
      a.rel = "noopener";
      a.textContent = l.label;
      linksLine.appendChild(a);
    });
    div.appendChild(linksLine);
  }

  if (e.note) {
    const note = document.createElement("div");
    note.className = "entry-note";
    note.textContent = e.note;
    div.appendChild(note);
  }
  return div;
}

function render() {
  renderFilters();
  renderSort();
  const list = document.getElementById("list");
  list.innerHTML = "";

  let shown = 0;
  for (const c of CATEGORIES) {
    if (state.view !== "all" && state.view !== "favs" && state.view !== c.key) continue;
    let entries = DATA.filter(e => e.category === c.key);
    if (state.game !== "all") entries = entries.filter(e => e.games.includes(state.game));
    if (state.view === "favs") entries = entries.filter(e => state.favs.has(idOf(e)));
    if (!entries.length) continue;
    sortEntries(entries);

    const h = document.createElement("div");
    h.className = "section-title";
    h.textContent = c.label;
    list.appendChild(h);
    for (const e of entries) list.appendChild(entryEl(e));
    shown += entries.length;
  }

  if (!shown) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = state.view === "favs" ? "No favorites yet — hover an entry and click the ☆ to save it." : "Nothing here.";
    list.appendChild(empty);
  }
}

render();
</script>
